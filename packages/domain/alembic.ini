# Alembic configuration for maya-domain.
# The database URL is intentionally NOT set here; migrations/env.py reads it
# from maya_domain settings (DATABASE_URL) so config lives in one place.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Left blank on purpose — resolved at runtime from Settings.database_url.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
